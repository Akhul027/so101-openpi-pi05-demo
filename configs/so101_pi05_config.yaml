project:
  name: so101-openpi-pi05-demo
  task: "Pick the cube and place it into the box."
  status: "configuration-first, robot not connected yet"

robot:
  type: so101_follower
  port: /dev/ttyACM0
  id: so101_follower_pi

teleop:
  type: so101_leader
  port: /dev/ttyACM1
  id: so101_leader_pi

cameras:
  top:
    type: opencv
    index_or_path: 4
    width: 640
    height: 480
    fps: 15
  wrist:
    type: opencv
    index_or_path: 2
    width: 640
    height: 480
    fps: 15

server:
  host: "0.0.0.0"
  port: 8080
  address_placeholder: "<RTX_SERVER_IP>:8080"

policy:
  type: pi05
  pretrained_name_or_path: "/path/to/pi05/checkpoint"
  device: cuda
  actions_per_chunk: 20
  chunk_size_threshold: 0.5
  aggregate_fn_name: weighted_average

safety:
  enable_action_clipping: true
  log_raw_action: true
  log_clipped_action: true

known_limitations:
  - "Robot is not connected during initial configuration."
  - "Camera indices are placeholders until hardware testing."
  - "SO101 action/state mapping must be validated."
  - "Trossen OpenPI examples are not plug-and-play for SO101."
  - "Network latency must be measured during remote inference."
